# Hibernate + Flyway settings for native-image.
#
# Hibernate: spring-orm excludes the BytecodeProvider service via
# -H:ServiceLoaderFeatureExcludeServices. Do not run hibernate-enhance-maven-plugin
# in the native profile: Hibernate 6.x enhancement generates bytecode that is
# incompatible with Hibernate 7's InstanceIdentity contract in native images.
#
# Flyway: only the JavaMigration SPI descriptor is embedded (not the blanket
# META-INF/services/.*), so Flyway's ServiceLoaderJavaMigrationScanner can
# discover the V2/V3 Java migrations at runtime.
Args = -Dhibernate.enable_lazy_load_no_trans=false
