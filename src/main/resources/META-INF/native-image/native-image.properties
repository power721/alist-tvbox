# Hibernate + Flyway settings for native-image.
#
# Hibernate: the BytecodeProvider service descriptor
# (META-INF/services/org.hibernate.bytecode.spi.BytecodeProvider) is deliberately
# NOT embedded as a resource, so Hibernate's runtime ServiceLoader finds no
# provider and falls back to none.BytecodeProviderImpl (registered for reflection
# in reflect-config.json). spring-orm also excludes it via
# -H:ServiceLoaderFeatureExcludeServices. Build-time entity enhancement is done
# by hibernate-enhance-maven-plugin. Note: hibernate.bytecode.provider was
# removed in 6.6 and is ignored, so it is no longer set here.
#
# Flyway: only the JavaMigration SPI descriptor is embedded (not the blanket
# META-INF/services/.*), so Flyway's ServiceLoaderJavaMigrationScanner can
# discover the V2/V3 Java migrations at runtime.
Args = -Dhibernate.enable_lazy_load_no_trans=false
