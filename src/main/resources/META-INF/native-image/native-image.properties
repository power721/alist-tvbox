# Hibernate settings for native-image
# BytecodeProvider resolves to the 'none' (no-op) provider via ServiceLoader
# fallback: spring-orm excludes the ByteBuddy provider from native-image
# (-H:ServiceLoaderFeatureExcludeServices=...BytecodeProvider) and we do not
# embed the META-INF/services descriptor as a resource, so Hibernate's runtime
# ServiceLoader finds no provider and falls back to none.BytecodeProviderImpl.
# Entity lazy loading / dirty tracking are handled at build time by the
# hibernate-enhance-maven-plugin. (Note: hibernate.bytecode.provider was
# removed in 6.6 and is ignored, so it is no longer set here.)
Args = -Dhibernate.enable_lazy_load_no_trans=false
