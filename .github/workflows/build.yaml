name: 'build master branch'

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - 'build*'
      - 'release*'
      - 'config/**'
      - 'doc/**'
      - 'docs/**'
      - '*.md'
      - 'pom.xml'
      - 'pom-standalone.xml'
      - 'docker/Dockerfile-v7'
      - 'docker/Dockerfile-base'
      - 'docker/Dockerfile-base-new'
      - 'docker/Dockerfile-native-base'
      - 'docker/Dockerfile-jre'
      - 'scripts/install.sh'
      - 'scripts/install-service.sh'
      - 'scripts/alist-tvbox.sh'
      - 'scripts/update_hostmode.sh'
      - 'scripts/update_native.sh'
      - 'scripts/update_native_host.sh'
      - 'scripts/update_new.sh'
      - 'scripts/update_xiaoya.sh'
      - '.github/workflows/build-base.yaml'
      - '.github/workflows/build-base-new.yaml'
      - '.github/workflows/build-native-dev.yaml'
      - '.github/workflows/build-native-base.yaml'
      - '.github/workflows/build-dev.yaml'
      - '.github/workflows/build-java.yaml'
      - '.github/workflows/build-v7.yaml'
      - '.github/workflows/release.yaml'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  # Job 1: 构建基础资源
  build-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./web-ui

      - name: Install npm
        working-directory: ./web-ui
        run: npm ci

      - name: Build web UI
        working-directory: ./web-ui
        run: npm run build

      - name: setup graalvm
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Extract Spring Boot layers
        working-directory: ./target
        run: java -Djarmode=layertools -jar alist-tvbox-1.0.jar extract

      - name: Set APP version
        run: |
          [ -d data ] || mkdir data
          export TZ=Asia/Shanghai
          echo $((($(date +%Y) - 2023) * 366 + $(date +%j | sed 's/^0*//'))).$(date +%H%M) > data/version
          echo "${{ github.event.head_commit.message }}" >> data/version
          cp data/version data/app_version
          cat data/version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            target/
            data/
            src/
            pom.xml
            web-ui/dist/
          retention-days: 1

  # Job 2: 快速测试（AMD64 only，本地构建）
  quick-test:
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image (AMD64 only, local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: alist-tvbox:test
          cache-from: type=gha,scope=master-quick-test
          cache-to: type=gha,mode=max,scope=master-quick-test

      - name: Test image
        run: |
          docker run -d --name quick-test -p 4567:4567 alist-tvbox:test

          echo "Waiting for AList to start (max 60 seconds)..."
          SUCCESS=false
          for i in {1..30}; do
            RESPONSE=$(curl -s http://localhost:4567/api/alist/status || echo "0")
            echo "Attempt $i/30: status=$RESPONSE"

            if [ "$RESPONSE" == "2" ]; then
              echo "✅ AList is running (status=2)"
              SUCCESS=true
              break
            elif [ "$RESPONSE" == "1" ]; then
              echo "⏳ AList is starting, waiting..."
            else
              echo "❌ AList not responding, waiting..."
            fi

            sleep 2
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Quick test failed: AList did not reach status 2 within 60 seconds"
            docker logs quick-test
            docker stop quick-test
            docker rm quick-test
            exit 1
          fi

          echo "✅ Quick test passed"
          docker stop quick-test
          docker rm quick-test

  # Job 3: 构建并测试 JVM 镜像（并行）
  build-and-test-jvm-images:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: xiaoya-tvbox
            dockerfile: docker/Dockerfile-xiaoya
            port: 4567
          - name: alist-tvbox
            dockerfile: docker/Dockerfile
            port: 4568
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image.name }} (local only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ matrix.image.name }}:test
          cache-from: type=gha,scope=master-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=master-${{ matrix.image.name }}

      - name: Test ${{ matrix.image.name }} container
        run: |
          docker run -d --name test-${{ matrix.image.name }} -p ${{ matrix.image.port }}:4567 ${{ matrix.image.name }}:test

          echo "Waiting for AList to start (max 60 seconds)..."
          SUCCESS=false
          for i in {1..30}; do
            RESPONSE=$(curl -s http://localhost:${{ matrix.image.port }}/api/alist/status || echo "0")
            echo "Attempt $i/30: status=$RESPONSE"

            if [ "$RESPONSE" == "2" ]; then
              echo "✅ AList is running (status=2)"
              SUCCESS=true
              break
            elif [ "$RESPONSE" == "1" ]; then
              echo "⏳ AList is starting, waiting..."
            else
              echo "❌ AList not responding, waiting..."
            fi

            sleep 2
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Test failed: AList did not reach status 2 within 60 seconds"
            docker logs test-${{ matrix.image.name }}
            docker stop test-${{ matrix.image.name }}
            docker rm test-${{ matrix.image.name }}
            exit 1
          fi

          echo "✅ Test passed: AList status is 2 (running)"
          docker stop test-${{ matrix.image.name }}
          docker rm test-${{ matrix.image.name }}

  # Job 4: 构建并测试 Native 镜像（快速测试通过后才执行）
  build-and-test-native:
    needs: quick-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts

      - name: setup graalvm
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-musl: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Build native with Maven (AMD64)
        run: |
          mvn -B -Pnative -DskipTests -Dnative.image.cache=true -Dnative-image.parallelism=8 package --file pom.xml
          chmod a+x target/atv
          ls -l target
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build alist native docker (local only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile-alist-native
          platforms: linux/amd64
          push: false
          load: true
          tags: alist-tvbox:native-test
          cache-from: type=gha,scope=master-native
          cache-to: type=gha,mode=max,scope=master-native

      - name: Test native container
        run: |
          docker run -d --name test-native -p 4569:4567 alist-tvbox:native-test

          echo "Waiting for AList to start (max 60 seconds)..."
          SUCCESS=false
          for i in {1..30}; do
            RESPONSE=$(curl -s http://localhost:4569/api/alist/status || echo "0")
            echo "Attempt $i/30: status=$RESPONSE"

            if [ "$RESPONSE" == "2" ]; then
              echo "✅ AList is running (status=2)"
              SUCCESS=true
              break
            elif [ "$RESPONSE" == "1" ]; then
              echo "⏳ AList is starting, waiting..."
            else
              echo "❌ AList not responding, waiting..."
            fi

            sleep 2
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Test failed: AList did not reach status 2 within 60 seconds"
            docker logs test-native
            docker stop test-native
            docker rm test-native
            exit 1
          fi

          echo "✅ Test passed: AList status is 2 (running)"
          docker stop test-native
          docker rm test-native
