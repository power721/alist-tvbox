name: 'release docker'

on:
  push:
    tags:
      - '*'

jobs:
  # Job 1: 构建基础资源（web UI + Maven jar）
  build-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./web-ui

      - name: Install npm
        working-directory: ./web-ui
        run: npm ci

      - name: Build web UI
        working-directory: ./web-ui
        run: npm run build

      - name: setup graalvm
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Extract Spring Boot layers
        working-directory: ./target
        run: java -Djarmode=layertools -jar alist-tvbox-1.0.jar extract

      - name: Set APP version
        run: |
          [ -d data ] || mkdir data
          echo "${{ github.ref_name }}" > data/version
          echo "${{ github.ref_name }}" > data/app_version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            target/
            data/
            src/
            pom.xml
            web-ui/dist/
          retention-days: 1

  # Job 2: 快速测试（AMD64 only，本地构建）
  quick-test:
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image (AMD64 only, local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: alist-tvbox:test
          cache-from: type=gha,scope=quick-test
          cache-to: type=gha,mode=max,scope=quick-test

      - name: Test image
        run: |
          docker run -d --name quick-test -p 4567:4567 alist-tvbox:test

          echo "Waiting for AList to start (max 60 seconds)..."
          SUCCESS=false
          for i in {1..30}; do
            RESPONSE=$(curl -s http://localhost:4567/api/alist/status || echo "0")
            echo "Attempt $i/30: status=$RESPONSE"

            if [ "$RESPONSE" == "2" ]; then
              echo "✅ AList is running (status=2)"
              SUCCESS=true
              break
            elif [ "$RESPONSE" == "1" ]; then
              echo "⏳ AList is starting, waiting..."
            else
              echo "❌ AList not responding, waiting..."
            fi

            sleep 2
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Quick test failed: AList did not reach status 2 within 60 seconds"
            docker logs quick-test
            docker stop quick-test
            docker rm quick-test
            exit 1
          fi

          echo "✅ Quick test passed"
          docker stop quick-test
          docker rm quick-test

  # Job 3: 构建 JVM 镜像（只推送版本标签）
  build-jvm-images:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: xiaoya-tvbox
            dockerfile: docker/Dockerfile-xiaoya
            image_name: xiaoya-tvbox
          - name: xiaoya-tvbox-host
            dockerfile: docker/Dockerfile-host
            image_name: xiaoya-tvbox-hostmode
            additional_image: xiaoya-tvbox-host
          - name: alist-tvbox
            dockerfile: docker/Dockerfile
            image_name: alist-tvbox
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build tags list
        id: tags
        run: |
          TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.image_name }}:${{ github.ref_name }}"
          if [ -n "${{ matrix.image.additional_image }}" ]; then
            TAGS="$TAGS,${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.additional_image }}:${{ github.ref_name }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image.name }} (version tag only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  # Job 4: 构建 Native 二进制（快速测试通过后才执行）
  build-native:
    needs: quick-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts

      - name: setup graalvm
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-musl: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Build native with Maven
        run: |
          mvn -B -Pnative -DskipTests -Dnative.image.cache=true -Dnative-image.parallelism=8 package --file pom.xml
          chmod a+x target/atv
          ls -l target

      - name: Upload native binary
        uses: actions/upload-artifact@v7
        with:
          name: native-binary
          path: target/atv
          retention-days: 1

  # Job 5: 构建 Native 镜像（只推送版本标签）
  build-native-images:
    needs: [build-base, build-native]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: alist-tvbox-native
            dockerfile: docker/Dockerfile-alist-native
            image_name: alist-tvbox-native
          - name: xiaoya-tvbox-native
            dockerfile: docker/Dockerfile-native
            image_name: xiaoya-tvbox-native
          - name: xiaoya-tvbox-native-host
            dockerfile: docker/Dockerfile-native-host
            image_name: xiaoya-tvbox-native-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts

      - name: Download native binary
        uses: actions/download-artifact@v7
        with:
          name: native-binary
          path: target

      - name: Fix permissions
        run: chmod a+x target/atv

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }} (version tag only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.image_name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  # Job 6: 测试镜像（测试版本标签）
  test-images:
    needs: [build-jvm-images, build-native-images]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test:
          - name: xiaoya-tvbox
            image: xiaoya-tvbox-hostmode
            port: 4567
          - name: alist-tvbox
            image: alist-tvbox
            port: 4568
          - name: alist-tvbox-native
            image: alist-tvbox-native
            port: 4569
    steps:
      - name: Test ${{ matrix.test.name }} container
        run: |
          docker run -d --name test-${{ matrix.test.name }} -p ${{ matrix.test.port }}:4567 ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.test.image }}:${{ github.ref_name }}

          echo "Waiting for AList to start (max 60 seconds)..."
          SUCCESS=false
          for i in {1..30}; do
            RESPONSE=$(curl -s http://localhost:${{ matrix.test.port }}/api/alist/status || echo "0")
            echo "Attempt $i/30: status=$RESPONSE"

            if [ "$RESPONSE" == "2" ]; then
              echo "✅ AList is running (status=2)"
              SUCCESS=true
              break
            elif [ "$RESPONSE" == "1" ]; then
              echo "⏳ AList is starting, waiting..."
            else
              echo "❌ AList not responding, waiting..."
            fi

            sleep 2
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Test failed: AList did not reach status 2 within 60 seconds"
            docker logs test-${{ matrix.test.name }}
            docker stop test-${{ matrix.test.name }}
            docker rm test-${{ matrix.test.name }}
            exit 1
          fi

          echo "✅ Test passed: AList status is 2 (running)"
          docker stop test-${{ matrix.test.name }}
          docker rm test-${{ matrix.test.name }}

  # Job 7: 添加 latest 标签（测试通过后）
  tag-latest:
    needs: test-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - source_image: xiaoya-tvbox-hostmode
            target_tags: "xiaoya-tvbox:latest xiaoya-tvbox:hostmode xiaoya-tvbox:host xiaoya-tvbox-hostmode:latest xiaoya-tvbox-host:latest"
          - source_image: alist-tvbox
            target_tags: "alist-tvbox:latest"
          - source_image: alist-tvbox-native
            target_tags: "alist-tvbox:native alist-tvbox-native:latest"
          - source_image: xiaoya-tvbox-native
            target_tags: "xiaoya-tvbox:native xiaoya-tvbox-native:latest"
          - source_image: xiaoya-tvbox-native-host
            target_tags: "xiaoya-tvbox:native-host xiaoya-tvbox-native-host:latest"
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull source image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.source_image }}:${{ github.ref_name }}

      - name: Tag and push latest tags
        run: |
          SOURCE_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.source_image }}:${{ github.ref_name }}"
          for TARGET in ${{ matrix.target_tags }}; do
            TARGET_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${TARGET}"
            echo "Tagging $SOURCE_IMAGE as $TARGET_IMAGE"
            docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE"
            docker push "$TARGET_IMAGE"
          done

  # Job 8: 发送通知（仅测试成功时）
  notify:
    needs: tag-latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read release notes
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BODY="$(gh release view "${{ github.ref_name }}" --json body --jq .body || true)"
          {
            echo "body<<EOF"
            printf '%s\n' "$RELEASE_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.CHANNEL_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            AList-TvBox 发布新版本 ✅
            版本: ${{ github.ref_name }}
            仓库: ${{ github.repository }}
            发布人: ${{ github.actor }}
            Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}

            更新内容:
            ${{ steps.release_notes.outputs.body }}
