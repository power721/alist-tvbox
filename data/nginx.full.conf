# nginx.conf for AList + alist-tvbox
# V3 minimal production version
#
# Goals:
# - Keep /d/ video/download streaming friendly.
# - Do NOT cache AList API, pages, directory listing, login state, WebDAV, or video streams.
# - Cache only safe remote images.
# - Block dangerous AList management/write APIs.
# - Remove unused /tvbox and /tvbox/cat locations.

proxy_cache_path /var/cache/nginx/image
    levels=1:2
    keys_zone=image_cache:300m
    inactive=1d
    max_size=10g
    use_temp_path=off;

limit_req_zone $binary_remote_addr zone=alist_normal:20m rate=2r/s;

resolver 223.5.5.5 119.29.29.29 114.114.114.114 valid=300s ipv6=off;
resolver_timeout 5s;

map $http_x_forwarded_proto $client_scheme {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# /image only allows common public image/CDN hosts.
# Add your trusted domains here when needed.
map $uri $image_target {
    default "";
    ~^/image/(img[0-9]*\.doubanio\.com/.+)$      https://$1;
    ~^/image/(image\.tmdb\.org/.+)$              https://$1;
    ~^/image/(www\.themoviedb\.org/.+)$          https://$1;
    ~^/image/(static-mdb\.v.geilijiasu\.com/.+)$ https://$1;
    ~^/image/(mmbiz\.qpic\.cn/.+)$               https://$1;
    ~^/image/(qpic\.cn/.+)$                      https://$1;
    ~^/image/(wx\.qlogo\.cn/.+)$                 https://$1;
}

server {
    listen 80 default_server;
    listen [::]:80;
    server_name _;

    client_max_body_size 20000m;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 1;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    add_header X-Proxy-By "alist-tvbox-nginx-v3" always;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_redirect off;

    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Safer image proxy. Unsupported domains return 403.
    location ~ ^/image/ {
        if ($image_target = "") {
            return 403;
        }

        proxy_pass $image_target;
        proxy_ssl_server_name on;

        proxy_set_header Referer "https://servicewechat.com/wx2f9b06c1de1ccfca/84/page-frame.html";
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36 MicroMessenger/7.0 MiniProgramEnv/Windows";

        proxy_cache image_cache;
        proxy_cache_valid 200 301 302 1d;
        proxy_cache_valid 404 10m;
        proxy_cache_lock on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        proxy_buffering on;
        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # AList direct download / video stream.
    # Important: no cache, no buffering, keep Range.
    location /d/ {
        proxy_pass http://127.0.0.1:5244/d/;

        proxy_set_header Range    $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        limit_req zone=alist_normal burst=4 nodelay;
    }

    # Optional WebDAV.
    # Delete this block if you never use WebDAV clients.
    location /dav {
        proxy_pass http://127.0.0.1:5244/dav;

        proxy_set_header Range    $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_intercept_errors on;
        error_page 301 302 =307 $upstream_http_location;
        proxy_method $request_method;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        limit_req zone=alist_normal burst=8 nodelay;
    }

    # Block dangerous AList management/write APIs.
    location ^~ /@manage       { deny all; }
    location ^~ /api/admin     { deny all; }
    location ^~ /api/fs/copy   { deny all; }
    location ^~ /api/fs/move   { deny all; }
    location ^~ /api/fs/mkdir  { deny all; }
    location ^~ /api/fs/put    { deny all; }
    location ^~ /api/fs/remove { deny all; }
    location ^~ /api/fs/rename { deny all; }
    location ^~ /api/fs/search { deny all; }

    # AList default proxy.
    # Important: no cache for API, pages, directory listing, login state, and playback.
    location / {
        proxy_pass http://127.0.0.1:5244;

        proxy_set_header Range    $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 30s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}